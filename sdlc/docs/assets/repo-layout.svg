<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 420" width="560" height="420" role="img" aria-labelledby="title desc">
  <title id="title">Repository layout for blueprints and project docs</title>
  <desc id="desc">Tree showing blueprints/sdlc, blueprints/product, blueprints/agents, sdlc, and docs folder</desc>
  <rect width="100%" height="100%" fill="none"/>
  <g font-family="system-ui, Segoe UI, sans-serif" font-size="11" fill="#F1F5F9">
    <text x="280" y="22" text-anchor="middle" font-weight="700" font-size="12" fill="#06B6D4">Repository root (conceptual)</text>
    <rect x="250" y="38" width="60" height="28" rx="3" fill="#111827" stroke="#06B6D4" stroke-width="2"/>
    <text x="280" y="56" text-anchor="middle" font-weight="600">README.md</text>
    <line x1="280" y1="66" x2="280" y2="78" stroke="#334155" stroke-width="1.5"/>
    <line x1="60" y1="78" x2="500" y2="78" stroke="#334155" stroke-width="1.5"/>
    <line x1="60" y1="78" x2="60" y2="88" stroke="#334155" stroke-width="1.5"/>
    <line x1="180" y1="78" x2="180" y2="88" stroke="#334155" stroke-width="1.5"/>
    <line x1="300" y1="78" x2="300" y2="88" stroke="#334155" stroke-width="1.5"/>
    <line x1="420" y1="78" x2="420" y2="88" stroke="#334155" stroke-width="1.5"/>
    <rect x="10" y="88" width="100" height="48" rx="3" fill="#0d1f1a" stroke="#06B6D4" stroke-width="2"/>
    <text x="60" y="102" text-anchor="middle" font-weight="700" font-size="7.5" fill="#06B6D4">blueprints/sdlc/</text>
    <text x="60" y="118" text-anchor="middle" font-size="8" fill="#94A3B8">frozen SDLC</text>
    <rect x="130" y="88" width="100" height="48" rx="3" fill="#1a1633" stroke="#a78bfa" stroke-width="2"/>
    <text x="180" y="102" text-anchor="middle" font-weight="700" font-size="7.5" fill="#a78bfa">blueprints/product/</text>
    <text x="180" y="118" text-anchor="middle" font-size="8" fill="#94A3B8">functional IA</text>
    <rect x="250" y="88" width="100" height="48" rx="3" fill="#1f1a10" stroke="#F59E0B" stroke-width="2"/>
    <text x="300" y="102" text-anchor="middle" font-weight="700" font-size="7.5" fill="#F59E0B">blueprints/agents/</text>
    <text x="300" y="118" text-anchor="middle" font-size="8" fill="#94A3B8">Docker (optional)</text>
    <rect x="370" y="88" width="100" height="48" rx="3" fill="#111827" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="420" y="106" text-anchor="middle" font-weight="700" font-size="9" fill="#3b82f6">sdlc/</text>
    <text x="420" y="122" text-anchor="middle" font-size="8" fill="#94A3B8">project notes</text>
    <line x1="280" y1="136" x2="280" y2="152" stroke="#334155" stroke-width="1.5"/>
    <rect x="90" y="152" width="380" height="220" rx="3" fill="#111827" stroke="#334155" stroke-width="1.5"/>
    <text x="280" y="172" text-anchor="middle" font-weight="700" font-size="11">docs/</text>
    <text x="280" y="188" text-anchor="middle" font-size="9" fill="#708090">product &amp; delivery documentation</text>
    <rect x="110" y="200" width="340" height="22" rx="2" fill="#111827" stroke="#1f2937"/>
    <text x="280" y="215" text-anchor="middle" font-size="9">product/ ? vision, journeys, features (mutable)</text>
    <rect x="110" y="230" width="340" height="22" rx="2" fill="#111827" stroke="#1f2937"/>
    <text x="280" y="245" text-anchor="middle" font-size="9">PROJECT.md / ROADMAP.md (optional)</text>
    <rect x="110" y="260" width="340" height="22" rx="2" fill="#111827" stroke="#1f2937"/>
    <text x="280" y="275" text-anchor="middle" font-size="9">requirements/ ? WBS ? milestones ? risks</text>
    <rect x="110" y="290" width="340" height="22" rx="2" fill="#111827" stroke="#1f2937"/>
    <text x="280" y="305" text-anchor="middle" font-size="9">architecture/ ? adr/ ? release/ ...</text>
    <text x="280" y="360" text-anchor="middle" font-size="9" fill="#708090">Optional: agents/ (mutable) beside blueprints ? see agents.html</text>
  </g>
