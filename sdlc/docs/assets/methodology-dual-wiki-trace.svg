<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 756 200" width="756" height="200" role="img" aria-labelledby="title desc">
  <title id="title">Dual wiki trace: machine records as source of truth, human report derived, freeze gate blocks drift</title>
  <desc id="desc">Every autonomous run writes machine records (run.json, phases.json, artifacts.json, proof.json) as the source of truth. The human report.md is generated from those records. A freeze gate re-derives the human narrative from the machine records and fails with a non-zero exit if the on-disk report differs, so the narrative can never silently drift.</desc>
  <rect width="100%" height="100%" fill="none"/>
  <text x="378" y="18" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-weight="700" font-size="12" fill="#06B6D4">Dual-wiki trace  one writer, one direction of truth</text>
  <g font-family="system-ui, sans-serif">
    <!-- Machine M -->
    <rect x="36" y="44" width="248" height="120" rx="5" fill="#1e3a5f" stroke="#06B6D4" stroke-width="1"/>
    <text x="160" y="64" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">Wiki M  machine canonical</text>
    <text x="160" y="80" text-anchor="middle" fill="#06B6D4" font-size="8" font-weight="700">source of truth</text>
    <text x="52" y="100" fill="#cbd5e1" font-size="8.5">machine/run.json  goal, target, level, status</text>
    <text x="52" y="116" fill="#cbd5e1" font-size="8.5">machine/phases.json  classify, route, &</text>
    <text x="52" y="132" fill="#cbd5e1" font-size="8.5">machine/artifacts.json  patch, proof, pack</text>
    <text x="52" y="148" fill="#cbd5e1" font-size="8.5">machine/proof.json  verification outcome</text>

    <!-- Freeze gate -->
    <rect x="316" y="78" width="124" height="52" rx="5" fill="#744210" stroke="#f59e0b" stroke-width="1"/>
    <text x="378" y="98" text-anchor="middle" fill="#fff" font-weight="700" font-size="9">freeze gate</text>
    <text x="378" y="112" text-anchor="middle" fill="#fde68a" font-size="7.5">re-derive H2 from M</text>
    <text x="378" y="123" text-anchor="middle" fill="#fde68a" font-size="7.5">H must equal H2</text>

    <!-- Human H -->
    <rect x="472" y="44" width="248" height="120" rx="5" fill="#285e61" stroke="#059669" stroke-width="1"/>
    <text x="596" y="64" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">Wiki H  human narrative</text>
    <text x="596" y="80" text-anchor="middle" fill="#6ee7b7" font-size="8" font-weight="700">derived from M</text>
    <text x="488" y="102" fill="#d1fae5" font-size="8.5">human/report.md  the story of the run</text>
    <text x="488" y="120" fill="#d1fae5" font-size="8.5">Summary · Classification · Phases</text>
    <text x="488" y="138" fill="#d1fae5" font-size="8.5">Proof · Model usage · Assay gate</text>
    <text x="488" y="156" fill="#fca5a5" font-size="8">never hand-edit  regenerate</text>
  </g>
  <g stroke="#0e7490" stroke-width="1.5" fill="none">
    <path d="M 284 104 L 316 104"/>
    <path d="M 440 104 L 472 104"/>
  </g>
  <g fill="#708090">
    <polygon points="316,104 310,100 310,108"/>
    <polygon points="472,104 466,100 466,108"/>
  </g>
  <text x="300" y="98" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7.5" fill="#94a3b8">generate</text>
  <text x="456" y="98" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7.5" fill="#94a3b8">write</text>

  <text x="378" y="188" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8.5" fill="#708090">If the on-disk report differs from the re-derived narrative, the freeze gate fails (non-zero exit)  the same pattern as the workspace check-wiki-freeze gates.</text>
</svg>
