<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 756 224" width="756" height="224" role="img" aria-labelledby="title desc">
  <title id="title">PDCA campaign cycle and the worker ladder</title>
  <desc id="desc">Plan, Do, Check, Act runs each campaign item in an isolated git worktree. Check runs the dual-wiki freeze gate, the Assay gate, the driver final status, and any item verification command. On failure Act steps to the next worker tier: local Granite, then Cursor, then deterministic, then fake. Promotion needs a clean live tree and is never auto-committed.</desc>
  <rect width="100%" height="100%" fill="none"/>
  <text x="378" y="18" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-weight="700" font-size="12" fill="#06B6D4">PDCA campaigns  one item at a time, worktree-isolated, gate-checked</text>
  <g font-family="system-ui, sans-serif">
    <rect x="48" y="36" width="150" height="54" rx="4" fill="#1e3a5f"/>
    <text x="123" y="58" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">Plan</text>
    <text x="123" y="74" text-anchor="middle" fill="#cbd5e1" font-size="8">goal · target · level</text>

    <rect x="218" y="36" width="150" height="54" rx="4" fill="#553c9a"/>
    <text x="293" y="58" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">Do</text>
    <text x="293" y="74" text-anchor="middle" fill="#e9d5ff" font-size="8">draft ’ apply in worktree</text>

    <rect x="388" y="36" width="150" height="54" rx="4" fill="#285e61"/>
    <text x="463" y="55" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">Check</text>
    <text x="463" y="69" text-anchor="middle" fill="#d1fae5" font-size="7.5">freeze · assay · final_status</text>
    <text x="463" y="80" text-anchor="middle" fill="#d1fae5" font-size="7.5">· verification_argv</text>

    <rect x="558" y="36" width="150" height="54" rx="4" fill="#744210"/>
    <text x="633" y="55" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">Act</text>
    <text x="633" y="69" text-anchor="middle" fill="#fde68a" font-size="7.5">next worker tier,</text>
    <text x="633" y="80" text-anchor="middle" fill="#fde68a" font-size="7.5">promote or block</text>
  </g>
  <g stroke="#0e7490" stroke-width="1.5" fill="none">
    <path d="M 198 63 L 218 63"/>
    <path d="M 368 63 L 388 63"/>
    <path d="M 538 63 L 558 63"/>
  </g>
  <g fill="#708090">
    <polygon points="218,63 212,59 212,67"/>
    <polygon points="388,63 382,59 382,67"/>
    <polygon points="558,63 552,59 552,67"/>
  </g>
  <!-- Act loops back to Plan -->
  <path d="M 633 90 C 633 112, 123 112, 123 92" stroke="#0e7490" stroke-width="1.4" stroke-dasharray="4 3" fill="none"/>
  <polygon points="123,92 119,99 127,99" fill="#708090"/>
  <text x="378" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#94a3b8">next item · retry once with next tier</text>

  <!-- Worker ladder -->
  <text x="48" y="140" font-family="system-ui, sans-serif" font-weight="700" font-size="10" fill="#cbd5e1">Worker ladder  step on failure or timeout</text>
  <g font-family="system-ui, sans-serif">
    <rect x="48" y="150" width="150" height="44" rx="4" fill="#553c9a"/>
    <text x="123" y="170" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">local (Granite)</text>
    <text x="123" y="184" text-anchor="middle" fill="#e9d5ff" font-size="8">sign-off default</text>

    <rect x="218" y="150" width="150" height="44" rx="4" fill="#553c9a"/>
    <text x="293" y="170" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">cursor</text>
    <text x="293" y="184" text-anchor="middle" fill="#e9d5ff" font-size="8">composer-2.5</text>

    <rect x="388" y="150" width="150" height="44" rx="4" fill="#285e61"/>
    <text x="463" y="170" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">deterministic</text>
    <text x="463" y="184" text-anchor="middle" fill="#d1fae5" font-size="8">CI only</text>

    <rect x="558" y="150" width="150" height="44" rx="4" fill="#285e61"/>
    <text x="633" y="170" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">fake</text>
    <text x="633" y="184" text-anchor="middle" fill="#d1fae5" font-size="8">offline fixture</text>
  </g>
  <g stroke="#b45309" stroke-width="1.4" fill="none" stroke-dasharray="4 3">
    <path d="M 198 172 L 218 172"/>
    <path d="M 368 172 L 388 172"/>
    <path d="M 538 172 L 558 172"/>
  </g>
  <g fill="#b45309">
    <polygon points="218,172 212,168 212,176"/>
    <polygon points="388,172 382,168 382,176"/>
    <polygon points="558,172 552,168 552,176"/>
  </g>

  <text x="378" y="214" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8.5" fill="#708090">Only the final patch unit runs verification_argv. Promotion requires a clean live tree and is never auto-committed  the operator commits.</text>
</svg>
