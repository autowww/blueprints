<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 95" width="680" height="95" role="img" aria-labelledby="title desc">
  <title id="title">Typical CI quality gate chain</title>
  <desc id="desc">Linear flow from trigger through static analysis, tests, and build; release may add stricter checks</desc>
  <rect width="100%" height="100%" fill="none"/>
  <g font-family="system-ui, Segoe UI, sans-serif" font-size="11" fill="#F1F5F9">
    <text x="340" y="16" text-anchor="middle" font-weight="700" font-size="12" fill="#06B6D4">CI / quality gates (conceptual chain)</text>
  </g>
  <g stroke="#0e7490" stroke-width="1.5" fill="none">
    <path d="M 118 55 L 128 55"/>
    <path d="M 238 55 L 248 55"/>
    <path d="M 358 55 L 368 55"/>
    <path d="M 478 55 L 488 55"/>
  </g>
  <g fill="#708090">
    <polygon points="128,55 122,51 122,59"/>
    <polygon points="248,55 242,51 242,59"/>
    <polygon points="368,55 362,51 362,59"/>
    <polygon points="488,55 482,51 482,59"/>
  </g>
  <g font-family="system-ui, Segoe UI, sans-serif">
    <rect x="10" y="30" width="108" height="50" rx="4" fill="#2c5282"/>
    <rect x="130" y="30" width="108" height="50" rx="4" fill="#2b6cb0"/>
    <rect x="250" y="30" width="108" height="50" rx="4" fill="#285e61"/>
    <rect x="370" y="30" width="108" height="50" rx="4" fill="#744210"/>
    <rect x="490" y="30" width="108" height="50" rx="4" fill="#553c9a"/>
    <text x="64" y="50" text-anchor="middle" fill="#fff" font-weight="700" font-size="11">Trigger</text>
    <text x="64" y="68" text-anchor="middle" fill="#fff" font-size="9">Push / PR</text>
    <text x="184" y="50" text-anchor="middle" fill="#fff" font-weight="700" font-size="11">Static</text>
    <text x="184" y="68" text-anchor="middle" fill="#fff" font-size="9">Lint / analysis</text>
    <text x="304" y="50" text-anchor="middle" fill="#fff" font-weight="700" font-size="11">Tests</text>
    <text x="304" y="68" text-anchor="middle" fill="#fff" font-size="9">Unit / contract</text>
    <text x="424" y="50" text-anchor="middle" fill="#fff" font-weight="700" font-size="11">Build</text>
    <text x="424" y="68" text-anchor="middle" fill="#fff" font-size="9">Artifact</text>
    <text x="544" y="50" text-anchor="middle" fill="#fff" font-weight="700" font-size="11">Gate</text>
    <text x="544" y="68" text-anchor="middle" fill="#fff" font-size="9">Green ť merge</text>
  </g>
  <text x="340" y="88" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8.5" fill="#708090">Add scans, E2E, signing  per project; failed step blocks merge unless waived</text>
</svg>
