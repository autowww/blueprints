<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 228" width="320" height="228" role="img" aria-labelledby="title desc">
  <title id="title">Story definition of done checklist</title>
  <desc id="desc">Six conditions for a story to be done</desc>
  <rect width="100%" height="100%" fill="#f6f3ed"/>
  <g font-family="system-ui, Segoe UI, sans-serif">
    <text x="160" y="22" text-anchor="middle" font-weight="700" font-size="12" fill="#2c5f4e">Story: done (all must hold)</text>
    <g transform="translate(24, 40)">
      <circle cx="8" cy="10" r="7" fill="none" stroke="#2c5f4e" stroke-width="2"/>
      <path d="M 5 10 L 7 13 L 12 7" fill="none" stroke="#2c5f4e" stroke-width="1.8" stroke-linecap="round"/>
      <text x="22" y="14" font-size="10" fill="#1a1f24">Acceptance criteria met (or waived with reason)</text>
    </g>
    <g transform="translate(24, 68)">
      <circle cx="8" cy="10" r="7" fill="none" stroke="#2c5f4e" stroke-width="2"/>
      <path d="M 5 10 L 7 13 L 12 7" fill="none" stroke="#2c5f4e" stroke-width="1.8" stroke-linecap="round"/>
      <text x="22" y="14" font-size="10" fill="#1a1f24">Canonical backlog marks story <tspan font-weight="600">done</tspan></text>
    </g>
    <g transform="translate(24, 96)">
      <circle cx="8" cy="10" r="7" fill="none" stroke="#2c5f4e" stroke-width="2"/>
      <path d="M 5 10 L 7 13 L 12 7" fill="none" stroke="#2c5f4e" stroke-width="1.8" stroke-linecap="round"/>
      <text x="22" y="14" font-size="10" fill="#1a1f24">Tests or documented exception</text>
    </g>
    <g transform="translate(24, 124)">
      <circle cx="8" cy="10" r="7" fill="none" stroke="#2c5f4e" stroke-width="2"/>
      <path d="M 5 10 L 7 13 L 12 7" fill="none" stroke="#2c5f4e" stroke-width="1.8" stroke-linecap="round"/>
      <text x="22" y="14" font-size="10" fill="#1a1f24">Required CI checks pass (or waiver)</text>
    </g>
    <g transform="translate(24, 152)">
      <circle cx="8" cy="10" r="7" fill="none" stroke="#2c5f4e" stroke-width="2"/>
      <path d="M 5 10 L 7 13 L 12 7" fill="none" stroke="#2c5f4e" stroke-width="1.8" stroke-linecap="round"/>
      <text x="22" y="14" font-size="10" fill="#1a1f24">Risk register updated if applicable</text>
    </g>
    <g transform="translate(24, 180)">
      <circle cx="8" cy="10" r="7" fill="none" stroke="#2c5f4e" stroke-width="2"/>
      <path d="M 5 10 L 7 13 L 12 7" fill="none" stroke="#2c5f4e" stroke-width="1.8" stroke-linecap="round"/>
      <text x="22" y="14" font-size="10" fill="#1a1f24">User-facing copy reviewed if applicable</text>
    </g>
  </g>
</svg>
