<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 756 210" width="756" height="210" role="img" aria-labelledby="title desc">
  <title id="title">Forge Dark Factory bounded execution loop (L1)</title>
  <desc id="desc">A sequential governed loop: classify, route, context, plan, draft, apply, verify, proof, trace, and escalate. Verify failures trigger bounded repair; ambiguity or budget exhaustion escalates to a human. The human still approves the branch or merge.</desc>
  <rect width="100%" height="100%" fill="none"/>
  <text x="378" y="18" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-weight="700" font-size="12" fill="#06B6D4">Bounded execution loop  deterministic, local-first, human-gated</text>
  <g font-family="system-ui, sans-serif">
    <!-- Row 1: analyze + plan (blue), then agent writes (purple) -->
    <rect x="12" y="40" width="110" height="46" rx="4" fill="#1e3a5f"/>
    <text x="67" y="61" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">classify</text>
    <text x="67" y="76" text-anchor="middle" fill="#cbd5e1" font-size="8">Cynefin À size À value</text>

    <rect x="134" y="40" width="110" height="46" rx="4" fill="#1e3a5f"/>
    <text x="189" y="61" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">route</text>
    <text x="189" y="76" text-anchor="middle" fill="#cbd5e1" font-size="8">cheapest tier</text>

    <rect x="256" y="40" width="110" height="46" rx="4" fill="#1e3a5f"/>
    <text x="311" y="61" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">context</text>
    <text x="311" y="76" text-anchor="middle" fill="#cbd5e1" font-size="8">bounded pack</text>

    <rect x="378" y="40" width="110" height="46" rx="4" fill="#1e3a5f"/>
    <text x="433" y="61" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">plan</text>
    <text x="433" y="76" text-anchor="middle" fill="#cbd5e1" font-size="8">patch units</text>

    <rect x="500" y="40" width="110" height="46" rx="4" fill="#553c9a"/>
    <text x="555" y="61" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">draft</text>
    <text x="555" y="76" text-anchor="middle" fill="#e9d5ff" font-size="8">fake À local À cursor</text>

    <rect x="622" y="40" width="110" height="46" rx="4" fill="#553c9a"/>
    <text x="677" y="61" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">apply</text>
    <text x="677" y="76" text-anchor="middle" fill="#e9d5ff" font-size="8">git worktree</text>

    <!-- Row 2 (right to left): evidence (teal), then human (amber) -->
    <rect x="622" y="118" width="110" height="46" rx="4" fill="#285e61"/>
    <text x="677" y="139" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">verify</text>
    <text x="677" y="154" text-anchor="middle" fill="#d1fae5" font-size="8">pytest / checks</text>

    <rect x="500" y="118" width="110" height="46" rx="4" fill="#285e61"/>
    <text x="555" y="139" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">proof</text>
    <text x="555" y="154" text-anchor="middle" fill="#d1fae5" font-size="8">proof report</text>

    <rect x="378" y="118" width="110" height="46" rx="4" fill="#285e61"/>
    <text x="433" y="139" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">trace</text>
    <text x="433" y="154" text-anchor="middle" fill="#d1fae5" font-size="8">M + H À freeze</text>

    <rect x="256" y="118" width="110" height="46" rx="4" fill="#744210"/>
    <text x="311" y="139" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">escalate?</text>
    <text x="311" y="154" text-anchor="middle" fill="#fde68a" font-size="8">human on ambiguity</text>
  </g>

  <!-- Solid connectors -->
  <g stroke="#0e7490" stroke-width="1.5" fill="none">
    <path d="M 122 63 L 134 63"/>
    <path d="M 244 63 L 256 63"/>
    <path d="M 366 63 L 378 63"/>
    <path d="M 488 63 L 500 63"/>
    <path d="M 610 63 L 622 63"/>
    <path d="M 677 86 L 677 118"/>
    <path d="M 622 141 L 610 141"/>
    <path d="M 500 141 L 488 141"/>
    <path d="M 378 141 L 366 141"/>
  </g>
  <g fill="#708090">
    <polygon points="134,63 128,59 128,67"/>
    <polygon points="256,63 250,59 250,67"/>
    <polygon points="378,63 372,59 372,67"/>
    <polygon points="500,63 494,59 494,67"/>
    <polygon points="622,63 616,59 616,67"/>
    <polygon points="677,118 673,112 681,112"/>
    <polygon points="610,141 616,137 616,145"/>
    <polygon points="488,141 494,137 494,145"/>
    <polygon points="366,141 372,137 372,145"/>
  </g>

  <!-- Repair back-edge (dashed) from verify up to draft -->
  <path d="M 640 118 C 600 100, 590 96, 560 88" stroke="#b45309" stroke-width="1.4" stroke-dasharray="4 3" fill="none"/>
  <polygon points="558,88 565,86 562,93" fill="#b45309"/>
  <text x="612" y="104" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#f59e0b">fail Æ repair (bounded)</text>

  <text x="378" y="192" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8.5" fill="#708090">Time is spent before tokens: deterministic first, then local, then decompose  cloud/human only when value justifies it. Humans still approve the branch/merge.</text>
</svg>
