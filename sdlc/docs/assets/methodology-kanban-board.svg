<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 108" width="720" height="108" role="img" aria-labelledby="title desc">
  <title id="title">Kanban board flow with WIP limit</title>
  <desc id="desc">Columns from backlog to done; work in progress limited in the doing column</desc>
  <rect width="100%" height="100%" fill="none"/>
  <text x="360" y="18" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-weight="700" font-size="12" fill="#06B6D4">Kanban — pull flow (conceptual board)</text>
  <g font-family="system-ui, sans-serif">
    <rect x="16" y="32" width="160" height="62" rx="4" fill="#111827" stroke="#2c5282" stroke-width="2"/>
    <text x="96" y="52" text-anchor="middle" font-weight="700" font-size="10" fill="#F1F5F9">Backlog</text>
    <text x="96" y="68" text-anchor="middle" font-size="8.5" fill="#708090">Ordered options</text>
    <rect x="36" y="74" width="28" height="14" rx="2" fill="#334155"/>
    <rect x="68" y="74" width="28" height="14" rx="2" fill="#334155"/>
    <rect x="188" y="32" width="160" height="62" rx="4" fill="#111827" stroke="#285e61" stroke-width="2"/>
    <text x="268" y="52" text-anchor="middle" font-weight="700" font-size="10" fill="#F1F5F9">Ready</text>
    <text x="268" y="68" text-anchor="middle" font-size="8.5" fill="#708090">Pull when capacity</text>
    <rect x="208" y="74" width="28" height="14" rx="2" fill="#065f46"/>
    <rect x="360" y="32" width="160" height="62" rx="4" fill="#111827" stroke="#F59E0B" stroke-width="2" stroke-dasharray="4 2"/>
    <text x="440" y="50" text-anchor="middle" font-weight="700" font-size="10" fill="#F1F5F9">Doing</text>
    <text x="440" y="64" text-anchor="middle" font-size="8" fill="#F59E0B">WIP limit (e.g. 3)</text>
    <rect x="380" y="72" width="28" height="14" rx="2" fill="#78350f"/>
    <rect x="412" y="72" width="28" height="14" rx="2" fill="#78350f"/>
    <rect x="444" y="72" width="28" height="14" rx="2" fill="#78350f"/>
    <rect x="532" y="32" width="172" height="62" rx="4" fill="#111827" stroke="#553c9a" stroke-width="2"/>
    <text x="618" y="52" text-anchor="middle" font-weight="700" font-size="10" fill="#F1F5F9">Done</text>
    <text x="618" y="68" text-anchor="middle" font-size="8.5" fill="#708090">Releasable</text>
  </g>
  <g stroke="#0e7490" stroke-width="1.5" fill="none">
    <path d="M 176 63 L 188 63"/>
    <path d="M 348 63 L 360 63"/>
    <path d="M 520 63 L 532 63"/>
  </g>
  <polygon points="188,63 182,59 182,67" fill="#708090"/>
  <polygon points="360,63 354,59 354,67" fill="#708090"/>
  <polygon points="532,63 526,59 526,67" fill="#708090"/>
  <text x="360" y="102" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8.5" fill="#708090">Policies explicit · measure flow (lead time, cycle time) — not the same as git activity alone</text>
</svg>
