<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 100" width="720" height="100" role="img" aria-labelledby="title desc">
  <title id="title">Agentic SDLC flow with human ownership</title>
  <desc id="desc">Humans own intent and acceptance; agents and CI produce reviewable changes in the repository</desc>
  <rect width="100%" height="100%" fill="#f6f3ed"/>
  <text x="360" y="16" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-weight="700" font-size="12" fill="#2c5f4e">Agentic SDLC — intent, automation, audit trail</text>
  <g font-family="system-ui, sans-serif">
    <rect x="12" y="32" width="150" height="50" rx="4" fill="#1e3a5f"/>
    <text x="87" y="54" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">Human intent</text>
    <text x="87" y="70" text-anchor="middle" fill="#cbd5e1" font-size="8.5">Goals, AC, release</text>
    <rect x="182" y="32" width="150" height="50" rx="4" fill="#553c9a"/>
    <text x="257" y="54" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">Agents / IDE AI</text>
    <text x="257" y="70" text-anchor="middle" fill="#e9d5ff" font-size="8.5">Drafts, code, tests</text>
    <rect x="352" y="32" width="150" height="50" rx="4" fill="#744210"/>
    <text x="427" y="54" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">Review + CI</text>
    <text x="427" y="70" text-anchor="middle" fill="#fde68a" font-size="8.5">PR, gates, security</text>
    <rect x="522" y="32" width="186" height="50" rx="4" fill="#285e61"/>
    <text x="615" y="54" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">Repo + work units</text>
    <text x="615" y="70" text-anchor="middle" fill="#d1fae5" font-size="8.5">Commits, traceability</text>
  </g>
  <g stroke="#94a3b8" stroke-width="1.5" fill="none">
    <path d="M 162 57 L 182 57"/>
    <path d="M 332 57 L 352 57"/>
    <path d="M 502 57 L 522 57"/>
  </g>
  <polygon points="182,57 176,53 176,61" fill="#64748b"/>
  <polygon points="352,57 346,53 346,61" fill="#64748b"/>
  <polygon points="522,57 516,53 516,61" fill="#64748b"/>
  <text x="360" y="94" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8.5" fill="#64748b">Chat is not the audit trail — durable state lives in git, issues, and specs (see project tracking docs)</text>
</svg>
