<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 120" width="720" height="120" role="img" aria-labelledby="title desc">
  <title id="title">Agile as umbrella over concrete frameworks</title>
  <desc id="desc">Manifesto and principles span Scrum Kanban XP and other approaches</desc>
  <rect width="100%" height="100%" fill="#f6f3ed"/>
  <path d="M 80 88 Q 360 8 640 88" fill="none" stroke="#2c5f4e" stroke-width="3"/>
  <text x="360" y="28" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-weight="700" font-size="12" fill="#2c5f4e">Agile — values &amp; principles (umbrella)</text>
  <text x="360" y="46" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#334155">Manifesto + twelve principles · not a single process</text>
  <g font-family="system-ui, sans-serif">
    <rect x="60" y="78" width="180" height="36" rx="4" fill="#2c5282"/>
    <text x="150" y="100" text-anchor="middle" fill="#fff" font-weight="700" font-size="11">Scrum</text>
    <rect x="270" y="78" width="180" height="36" rx="4" fill="#285e61"/>
    <text x="360" y="100" text-anchor="middle" fill="#fff" font-weight="700" font-size="11">Kanban</text>
    <rect x="480" y="78" width="180" height="36" rx="4" fill="#744210"/>
    <text x="570" y="100" text-anchor="middle" fill="#fff" font-weight="700" font-size="11">XP (+ others)</text>
  </g>
  <line x1="150" y1="78" x2="300" y2="52" stroke="#94a3b8" stroke-width="1"/>
  <line x1="360" y1="78" x2="360" y2="52" stroke="#94a3b8" stroke-width="1"/>
  <line x1="570" y1="78" x2="420" y2="52" stroke="#94a3b8" stroke-width="1"/>
  <text x="360" y="114" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8.5" fill="#64748b">This blueprint's SDLC phases stay methodology-neutral; pick or blend frameworks below the umbrella</text>
</svg>
