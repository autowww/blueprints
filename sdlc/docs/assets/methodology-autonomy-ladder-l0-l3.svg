<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 756 220" width="756" height="220" role="img" aria-labelledby="title desc">
  <title id="title">Forge autonomy ladder L0 to L8, with L0 to L3 emphasized</title>
  <desc id="desc">A rising staircase of autonomy levels. L0 Assisted, L1 Function, L2 Change-set, and L3 Use-case slice are defined and exercised today and are drawn as solid steps. L4 Feature, L5 Subsystem, L6 Product increment, L7 Multi-cloud, and L8 Autonomous problem solving are drawn muted as future vision requiring extra human gates. Higher levels add gates and never remove lower-level gates.</desc>
  <rect width="100%" height="100%" fill="none"/>
  <text x="378" y="18" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-weight="700" font-size="12" fill="#06B6D4">Autonomy ladder  each level names the unit of delivery and the human gate</text>
  <g font-family="system-ui, sans-serif">
    <!-- Implemented / exercised: L0-L3 -->
    <rect x="8" y="162" width="76" height="24" rx="3" fill="#1e3a5f" stroke="#06B6D4" stroke-width="1"/>
    <text x="46" y="176" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">L0</text>
    <text x="46" y="198" text-anchor="middle" fill="#94a3b8" font-size="7">Assisted</text>

    <rect x="92" y="132" width="76" height="54" rx="3" fill="#1e3a5f" stroke="#06B6D4" stroke-width="1"/>
    <text x="130" y="150" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">L1</text>
    <text x="130" y="164" text-anchor="middle" fill="#e0f2fe" font-size="7">Function</text>
    <text x="130" y="176" text-anchor="middle" fill="#06B6D4" font-size="6.5" font-weight="700">today</text>
    <text x="130" y="198" text-anchor="middle" fill="#94a3b8" font-size="7">approve merge</text>

    <rect x="176" y="100" width="76" height="86" rx="3" fill="#1e3a5f" stroke="#06B6D4" stroke-width="1"/>
    <text x="214" y="118" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">L2</text>
    <text x="214" y="132" text-anchor="middle" fill="#e0f2fe" font-size="7">Change-set</text>
    <text x="214" y="144" text-anchor="middle" fill="#06B6D4" font-size="6.5" font-weight="700">today</text>
    <text x="214" y="198" text-anchor="middle" fill="#94a3b8" font-size="7">AC + merge</text>

    <rect x="260" y="68" width="76" height="118" rx="3" fill="#1e3a5f" stroke="#06B6D4" stroke-width="1"/>
    <text x="298" y="86" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">L3</text>
    <text x="298" y="100" text-anchor="middle" fill="#e0f2fe" font-size="7">Use-case</text>
    <text x="298" y="111" text-anchor="middle" fill="#e0f2fe" font-size="7">slice</text>
    <text x="298" y="198" text-anchor="middle" fill="#94a3b8" font-size="7">intent in; review out</text>

    <!-- Vision (muted): L4-L8 -->
    <rect x="344" y="118" width="76" height="68" rx="3" fill="#1e293b" fill-opacity="0.5" stroke="#475569" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="382" y="136" text-anchor="middle" fill="#94a3b8" font-weight="700" font-size="10">L4</text>
    <text x="382" y="150" text-anchor="middle" fill="#64748b" font-size="7">Feature</text>
    <text x="382" y="198" text-anchor="middle" fill="#64748b" font-size="7">ADR + release</text>

    <rect x="428" y="100" width="76" height="86" rx="3" fill="#1e293b" fill-opacity="0.5" stroke="#475569" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="466" y="118" text-anchor="middle" fill="#94a3b8" font-weight="700" font-size="10">L5</text>
    <text x="466" y="132" text-anchor="middle" fill="#64748b" font-size="7">Subsystem</text>

    <rect x="512" y="80" width="76" height="106" rx="3" fill="#1e293b" fill-opacity="0.5" stroke="#475569" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="550" y="98" text-anchor="middle" fill="#94a3b8" font-weight="700" font-size="10">L6</text>
    <text x="550" y="112" text-anchor="middle" fill="#64748b" font-size="7">Product</text>
    <text x="550" y="123" text-anchor="middle" fill="#64748b" font-size="7">increment</text>

    <rect x="596" y="58" width="76" height="128" rx="3" fill="#1e293b" fill-opacity="0.5" stroke="#475569" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="634" y="76" text-anchor="middle" fill="#94a3b8" font-weight="700" font-size="10">L7</text>
    <text x="634" y="90" text-anchor="middle" fill="#64748b" font-size="7">Multi-cloud</text>

    <rect x="680" y="36" width="68" height="150" rx="3" fill="#1e293b" fill-opacity="0.5" stroke="#475569" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="714" y="54" text-anchor="middle" fill="#94a3b8" font-weight="700" font-size="10">L8</text>
    <text x="714" y="68" text-anchor="middle" fill="#64748b" font-size="7">Autonomous</text>
  </g>

  <!-- Divider between implemented and vision -->
  <line x1="340" y1="30" x2="340" y2="186" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="176" y="46" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#06B6D4">defined and exercised (L0L3)</text>
  <text x="560" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#f59e0b">vision  extra gates (L4L8)</text>

  <text x="378" y="214" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8.5" fill="#708090">Higher levels add gates and never remove lower-level gates. Even L8 assumes a human-defined mission.</text>
</svg>
