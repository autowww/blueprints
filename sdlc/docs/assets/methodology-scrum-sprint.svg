<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 118" width="720" height="118" role="img" aria-labelledby="title desc">
  <title id="title">Scrum events within one Sprint</title>
  <desc id="desc">Product backlog feeds sprint planning, then build with daily scrums, review, retrospective; increment when done</desc>
  <rect width="100%" height="100%" fill="none"/>
  <text x="360" y="18" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-weight="700" font-size="12" fill="#06B6D4">Scrum — one Sprint (time-box)</text>
  <rect x="20" y="28" width="680" height="22" rx="3" fill="#1f2937" stroke="#0e7490"/>
  <text x="360" y="43" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#94A3B8">Product Backlog (ordered) — forecast for Sprint Backlog at Planning</text>
  <g font-family="system-ui, sans-serif">
    <rect x="20" y="58" width="155" height="44" rx="4" fill="#2c5282"/>
    <text x="97" y="78" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">Sprint Planning</text>
    <text x="97" y="92" text-anchor="middle" fill="#fff" font-size="8.5">Goal + forecast</text>
    <rect x="185" y="58" width="155" height="44" rx="4" fill="#285e61"/>
    <text x="262" y="76" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">Build increment</text>
    <text x="262" y="90" text-anchor="middle" fill="#fff" font-size="8.5">Daily Scrum (inspect/adapt)</text>
    <rect x="350" y="58" width="155" height="44" rx="4" fill="#744210"/>
    <text x="427" y="78" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">Sprint Review</text>
    <text x="427" y="92" text-anchor="middle" fill="#fff" font-size="8.5">Increment + feedback</text>
    <rect x="515" y="58" width="185" height="44" rx="4" fill="#6b2c5c"/>
    <text x="607" y="78" text-anchor="middle" fill="#fff" font-weight="700" font-size="10">Sprint Retrospective</text>
    <text x="607" y="92" text-anchor="middle" fill="#fff" font-size="8.5">Improve process</text>
  </g>
  <g stroke="#0e7490" stroke-width="1.5" fill="none">
    <path d="M 175 80 L 185 80"/>
    <path d="M 340 80 L 350 80"/>
    <path d="M 505 80 L 515 80"/>
  </g>
  <polygon points="185,80 179,76 179,84" fill="#708090"/>
  <polygon points="350,80 344,76 344,84" fill="#708090"/>
  <polygon points="515,80 509,76 509,84" fill="#708090"/>
  <text x="360" y="112" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8.5" fill="#708090">Increment is "Done" per Definition of Done · next Sprint replan from updated backlog</text>
</svg>
