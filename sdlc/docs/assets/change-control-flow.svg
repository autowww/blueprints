<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 132" width="720" height="132" role="img" aria-labelledby="title desc">
  <title id="title">Preferred path for controlled change</title>
  <desc id="desc">Change becomes visible in backlog and specs before implementation; traceability links PRs to work units</desc>
  <rect width="100%" height="100%" fill="none"/>
  <text x="360" y="18" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-weight="700" font-size="12" fill="#06B6D4">Scope and change — visible path vs hidden scope</text>
  <g font-family="system-ui, sans-serif" font-size="9">
    <rect x="16" y="32" width="130" height="40" rx="4" fill="#2c5282"/>
    <text x="81" y="52" text-anchor="middle" fill="#fff" font-weight="700">Change signal</text>
    <text x="81" y="64" text-anchor="middle" fill="#cbd5e1">Request, bug, idea</text>
    <polygon points="156,52 166,44 166,60" fill="#708090"/>
    <rect x="172" y="32" width="160" height="40" rx="4" fill="#285e61"/>
    <text x="252" y="50" text-anchor="middle" fill="#fff" font-weight="700">Backlog / WBS / spec</text>
    <text x="252" y="62" text-anchor="middle" fill="#d1fae5">New story or scope update</text>
    <polygon points="338,52 348,44 348,60" fill="#708090"/>
    <rect x="354" y="32" width="160" height="40" rx="4" fill="#744210"/>
    <text x="434" y="50" text-anchor="middle" fill="#fff" font-weight="700">Implement + link</text>
    <text x="434" y="62" text-anchor="middle" fill="#fde68a">PR, commits, REQ ids</text>
    <polygon points="520,52 530,44 530,60" fill="#708090"/>
    <rect x="536" y="32" width="168" height="40" rx="4" fill="#553c9a"/>
    <text x="620" y="52" text-anchor="middle" fill="#fff" font-weight="700">Traceable</text>
  </g>
  <rect x="172" y="88" width="528" height="34" rx="4" fill="#1a1012" stroke="#EF4444" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="436" y="104" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#EF4444">Avoid: extra code or scope with no backlog/spec update (hidden scope)</text>
  <text x="360" y="124" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8.5" fill="#708090">Time spent is not inferred from git alone — see Time tracking section</text>
</svg>
