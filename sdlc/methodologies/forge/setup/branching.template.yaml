# Forge SDLC — branch policy for humans + agents
# Generated by forge-init.sh (or copied manually into forge/branching.yml).
# Keep this file repository-specific.

schema_version: 1

# Primary integration branch (usually protected in Git host settings).
trunk: main

# Branch operating model:
# - team_tier      -> feature/* and fix/* defaults (GitHub Flow style)
# - forge_lanes    -> product/iter/spark/spike/release/hotfix lanes
model: team_tier

team:
  # Mirrors forge/forge.config.yaml team.scale when known.
  scale: solo
  # Repo topology affects whether parent product branches are needed.
  # one_of: single | monorepo | polyrepo | submodule
  topology: single
  # CI/CD maturity shapes strictness of merge gates.
  # one_of: none | basic | standard | advanced
  cicd_maturity: none

lanes:
  # Enables Forge-native lane interpretation for agents.
  enabled: false
  # Parent integration branch for a product spark (optional).
  product_parent_enabled: false
  # Default integration lane for active iteration work.
  default_iteration_prefix: iter/
  # Dedicated risk/parallel work lane.
  spark_prefix: spark/
  # Exploration-only branch lane.
  spike_prefix: spike/
  # Optional stabilization lane.
  release_prefix: release/
  # Production correction lane.
  hotfix_prefix: hotfix/

topic_branches:
  # Defaults used when model=team_tier.
  feature_prefix: feature/
  fix_prefix: fix/

promotion:
  # Default merge target for normal work.
  default_target: main
  # Require pull request to promote work into trunk/parent lanes.
  require_pr: true
  # Minimum approvals before merge.
  required_approvals: 1
  # Require green CI checks before merge.
  require_green_checks: false

agent_behavior:
  # Never create charge/*; Charge is a daily selection view.
  never_charge_branches: true
  # Commits/push/PR remain explicit user actions by default.
  commits_require_user_request: true
  pushes_require_user_request: true
  prs_require_user_request: true

# Backward-compatible fields consumed by docs-health policy resolver.
docs_health_branch_style: feature_prefixed
use_forge_lanes: false
