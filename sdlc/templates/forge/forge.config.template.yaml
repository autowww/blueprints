# Forge SDLC — project configuration
# Copy to forge/forge.config.yaml and edit.
# See: blueprints/sdlc/methodologies/forge/setup/QUESTIONNAIRE.md

project:
  name: ""
  stage: mvp

team:
  scale: solo
  iteration_weeks: 1
  ceremony_weight: light

hats:
  product:
    owner: ""
    dedicated: false
  engineering:
    owner: ""
    dedicated: false
  challenge:
    owner: ""
    dedicated: false
  governance:
    owner: ""
    dedicated: false

versona:
  families:
    engineering: true
    data: false
    product: true
    governance: true
  cross_cutting:
    security: true
    compliance: false
  product_disciplines:
    product_management: true
    business_analysis: true
    ux_design: true
    marketing: true
    customer_success: true
  engineering_disciplines:
    software_engineering: true
    software_architecture: true
    devops: true
    testing: true
    frontend: false
    mobile: false
    embedded_iot: false

assay_gate:
  core:
    - tests_pass
    - acceptance_criteria_met
    - risks_reviewed

paths:
  charge: forge/charge.md
  ember_logs: ember-logs/
  journal: forge/journal/
  releases: forge/releases/
